# ============================================================
# mosquitto.conf — Mosquitto 2.0.22
# Deux listeners :
#   1883 → interne Docker (entre conteneurs, sans TLS)
#   8883 → externe TLS (connexions depuis l'extérieur)
# ============================================================

# --- Listener interne Docker (1883 — sans TLS) --------------
listener 1883
protocol mqtt
allow_anonymous false
password_file /mosquitto/data/passwd
acl_file /mosquitto/config/acl

# --- Listener externe TLS (8883) ----------------------------
listener 8883
protocol mqtt

# Certificats TLS (générés par make setup-certs)
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile  /mosquitto/certs/server.key

# Authentification mutuelle obligatoire
require_certificate true
use_identity_as_username false

# Version TLS minimale
tls_version tlsv1.2

# Authentification identique au listener interne
allow_anonymous false
password_file /mosquitto/data/passwd
acl_file /mosquitto/config/acl

# --- Persistance -------------------------------------------
persistence true
persistence_location /mosquitto/data/

# --- Logs --------------------------------------------------
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# --- Sécurité réseau ---------------------------------------
max_connections -1
max_packet_size 262144
max_keepalive 120
